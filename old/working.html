<!DOCTYPE html>
<html>
<head>
<script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/angularjs/1.2.3/angular.min.js"></script>
<link href="//maxcdn.bootstrapcdn.com/bootstrap/3.2.0/css/bootstrap.min.css" rel="stylesheet">
<script src="//maxcdn.bootstrapcdn.com/bootstrap/3.2.0/js/bootstrap.min.js"></script>

	<style>
		body{
			background-color: #EEE;
			text-align: center;
		}
	</style>
	<meta charset="utf-8">

	<title>Work or no Work</title>
</head>
<body>
	<div class="jumbotron" ng-app="">
		<div ng-controller="time">
			<h1>Current Time: {{currentTime | date:'medium'}}</h1>
			<h1>I am {{working}}</h1>
  		</div>
	</div>

<script type="text/javascript">
function check(){
	var now = new Date();
	var day = now.getDay();
	var d = now.getHours();
	if (day > 0 && day < 5){
		if (d > 8 && d < 16) return "working";
		else if (d == 8 || d == 16) return "probably working";
		else if (d == 7 || d == 17) return "probably not working";
		else return "not working";
	}
	else if (day == 5)
		if (d > 8 && d < 15)
			return "possibly working because it's Friday!";
		else
			return "Fridaying";
	else
		return "not working because it's the weekend...";

}

function time($scope, $timeout){
	$scope.working = "stuff";
	$scope.interval = 1000;
	var tick = function(){
		$scope.working = check();
		$scope.currentTime = Date.now();
		$timeout(tick, $scope.interval);
	}
	tick();
}
</script>
</body>
</html>
