
<script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/angularjs/1.2.3/angular.min.js"></script>
<div ng-app="" style="text-align: center">
	<div ng-controller="main">
		<h1>{{time}}</h1>
		<h1>{{message}}</h1>
  	</div>
</div>
<script>
function main($scope, $timeout){

	var timer = function(){
		$scope.time = (new Date()).toLocaleTimeString();
		$timeout(timer, 1000);
	}
	timer();

	var msg = [
		"I am working",
		"I am not working",
		"I am probably working",
		"I am probably not working",
		"It's Friday!",
		"It's the weekend!"
	];

	var working = function(){
		var d = new Date();
		if (d.getDay() > 0 && // Monday through Thursday
			d.getDay() < 5)
			if (d.getHours() > 8 || d.getHours() < 16) // 9-4
				$scope.message = msg[0];
			else if (d.getHours() < 7 || d.getHours() > 17)
				$scope.message = msg[1];
			else if (d.getHours() == 8 || d.getHours() == 16)
				$scope.message = msg[2];
			else
				$scope.message = MSG[3];
		else if (d.getDay() == 5)
			$scope.message = msg[4];
		else
			$scope.message = msg[5];
		$timeout(working, 60000);
	}
	working();

}
</script>
