<!doctype html>
<html lang="en">
<head>
    <title>Mover</title>
    <link rel="stylesheet" href="http://yui.yahooapis.com/pure/0.3.0/pure-min.css">
    <script src="http://ajax.googleapis.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
    <link rel="stylesheet" href="index.css">
    <script type="text/javascript" src="js/keypress.js"></script>
    <script type="text/javascript">
        var began = false;
        if (began == false) {
            keypress.combo("enter", function () {
                //Create a red rectangle
                var canvas = document.getElementById("Canvas");
                var ctx = canvas.getContext("2d");
                ctx.fillStyle = "#FF0000";
                ctx.fillRect(0, 0, 150, 75);

                //change message
                message.innerHTML = "Use w,a,s,d to move";

                //has begun
                began = true;
            });
        }
    </script>
</head>
<body>
    <div class="content" id="layout">
        <div id="nav">
            <a href="#" class="nav-menu-button">Menu</a>
            <div class="nav-inner">
                <div class="pure-menu pure-menu-open">
                    <ul>
                        <li><a href="index.html" class="primary-button">Home</a></li>
                        <li><a href="about.html">About</a></li>
                        <li><a href="textit.html">Textit</a></li>
                        <li><a href="mover.html">Mover</a></li>
                    </ul>
                </div>
            </div>
        </div>
        <div id="main">
            <div class="content">
                <div class="content-header">
                    <div>
                        <h1 id="message" class="content-title">Shit goes here</h1>
                    </div>
                </div>

                <div class="content-body">
                    <canvas style="border: 1px solid black" id="Canvas" width="800" height="800"></canvas>
                </div>
            </div>
        </div>
    </div>
    <script type="text/javascript">
        var message = document.getElementById("message");
        message.innerHTML = "Press Enter to Begin";
    </script>
</body>
</html>
